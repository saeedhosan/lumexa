services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lumexa_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost:8000

      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=lumexa
      - DB_USERNAME=root
      - DB_PASSWORD=root

      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - REDIS_PORT=6379

      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - CACHE_PREFIX=lumexa_

      - SESSION_DRIVER=database
      - SESSION_LIFETIME=120

      - LOG_CHANNEL=daily
      - LOG_LEVEL=error

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./storage:/var/www/storage
    networks:
      - lumexa

  mysql:
    image: mysql:8.0
    container_name: lumexa_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=lumexa
      - MYSQL_USER=root
      - MYSQL_PASSWORD=root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - lumexa
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lumexa_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lumexa
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  lumexa:
    driver: bridge

volumes:
  mysql_data:
  redis_data: