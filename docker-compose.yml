services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      tags:
        - lumexa_app
    image: lumexa_app
    container_name: lumexa_server
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/var/www/html
    command:
      [
        "php",
        "artisan",
        "octane:frankenphp",
        "--host=0.0.0.0",
        "--port=8000",
        "--watch",
      ]
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - lumexa

  mysql:
    image: mysql:8.0
    container_name: lumexa_mysql
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-lumexa}
      MYSQL_USER: ${DB_USERNAME:-lumexa}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-secret}"]
      retries: 3
      timeout: 5s
    networks:
      - lumexa

  redis:
    image: redis:alpine
    container_name: lumexa_redis
    restart: unless-stopped
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - lumexa

networks:
  lumexa:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
