<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
  </defs>

  <!-- Glowing circle -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#grad)" stroke-width="6" opacity="0.4" />

  <!-- Stylized L -->
  <path d="M70 60 L70 140 L120 140" 
        fill="none" 
        stroke="url(#grad)" 
        stroke-width="10" 
        stroke-linecap="round" 
        stroke-linejoin="round" />

  <!-- Spark / light accent -->
  <circle cx="130" cy="70" r="6" fill="#22d3ee" />
</svg>
